<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeGenie AI | Premium Developer Assistant</title>
    
    <!-- Design System -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <!-- Fonts: Inter & JetBrains Mono for Code -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Markdown Rendering (Marked.js) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Syntax Highlighting (Prism.js) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Brand Header -->
        <header>
            <h1>CodeGenie AI</h1>
            <p>The premium intelligence layer for your development workflow. Generate, explain, and debug at the speed of thought.</p>
        </header>

        <!-- Main Interface -->
        <main>
            <!-- Workflow Input -->
            <div class="input-section">
                <div class="input-label">
                    <span>⚡ WORKFLOW PROMPT</span>
                </div>
                <textarea id="user-input" placeholder="Describe the feature you want to build or paste code to analyze..."></textarea>
                
                <div class="button-group">
                    <button id="btn-generate" class="action-btn btn-generate" onclick="handleAction('generate')">
                        🚀 Generate Code
                    </button>
                    <button id="btn-explain" class="action-btn btn-explain" onclick="handleAction('explain')">
                        📖 Explain Logic
                    </button>
                    <button id="btn-debug" class="action-btn btn-debug" onclick="handleAction('debug')">
                        🐛 Debug Code
                    </button>
                </div>
            </div>

            <!-- AI Insight Section -->
            <div class="output-section">
                <div class="output-header">
                    <h2>✨ AI INSIGHT</h2>
                </div>
                
                <div class="response-container">
                    <!-- Advanced Loader Waves -->
                    <div id="loading" class="hidden">
                        <div class="loader-waves">
                            <div class="wave"></div>
                            <div class="wave"></div>
                            <div class="wave"></div>
                            <div class="wave"></div>
                            <div class="wave"></div>
                        </div>
                        <p class="loading-text">CODEGENIE IS SYNTHESIZING...</p>
                    </div>
                    
                    <!-- Dynamic Response Output -->
                    <div id="ai-response">
                        <span style="color: var(--text-low); font-style: italic;">Awaiting your instruction... Use the buttons above to start.</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Core Logic -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
